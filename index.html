<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12th Result Congratulations</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            position: relative;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Confetti Animation */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            z-index: 1;
            pointer-events: none;
        }

        .confetti::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: inherit;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Fireworks */
        .firework {
            position: fixed;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0);
                opacity: 0;
            }
        }

        /* Balloons */
        .balloon {
            position: fixed;
            width: 40px;
            height: 50px;
            border-radius: 50% 50% 50% 0;
            bottom: -60px;
            z-index: 1;
            pointer-events: none;
            font-size: 30px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            animation: rise 5s ease-in forwards;
        }

        @keyframes rise {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-120vh) rotate(20deg);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: slideIn 0.8s ease-out;
            z-index: 10;
            position: relative;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 900;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #fff, #ffeb3b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 235, 59, 0.5)); }
            50% { filter: drop-shadow(0 0 20px rgba(255, 235, 59, 0.8)); }
        }

        .header p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.95);
            line-height: 1.6;
            margin-top: 15px;
        }

        .emoji-celebration {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.1); }
        }

        .name-section {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 20px;
            margin: 25px 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .name-section:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .name-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .name-input {
            font-size: 2rem;
            font-weight: 700;
            background: transparent;
            border: none;
            border-bottom: 3px solid rgba(255, 255, 255, 0.5);
            color: white;
            text-align: center;
            width: 100%;
            outline: none;
            padding: 10px;
            transition: all 0.3s ease;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .name-input:focus {
            border-bottom-color: #ffeb3b;
            text-shadow: 0 0 20px rgba(255, 235, 59, 0.5);
        }

        .name-input::placeholder {
            opacity: 0.7;
        }

        .result-card {
            background: linear-gradient(135deg, rgba(255, 235, 59, 0.2), rgba(255, 107, 107, 0.2));
            padding: 30px;
            border-radius: 25px;
            margin: 25px 0;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            animation: cardFloat 3s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-label {
            font-size: 0.95rem;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .percentage-display {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            margin: 15px 0;
            background: linear-gradient(135deg, #ffeb3b, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .percentage-input {
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            outline: none;
            margin-top: 12px;
            transition: all 0.3s ease;
            text-align: center;
        }

        .percentage-input:focus {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffeb3b;
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.5);
        }

        .photo-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            margin: 25px 0;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .photo-section:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .photo-section input[type="file"] {
            display: none;
        }

        .photo-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            font-size: 1rem;
        }

        .photo-label i {
            font-size: 1.5rem;
        }

.photo-preview {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            margin: 15px auto;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            animation: photoZoom 0.5s ease;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 25px 0;
        }

        .photo-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .photo-card:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .photo-card input[type="file"] {
            display: none;
        }

        .photo-card-label {
            font-size: 0.9rem;
            margin-bottom: 10px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .photo-preview-circular {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 15px auto;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 0 25px rgba(255, 235, 59, 0.4);
            animation: photoZoom 0.5s ease;
        }

        .photo-preview-circular:hover {
            box-shadow: 0 0 35px rgba(255, 235, 59, 0.7);
        }

        @keyframes photoZoom {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .buttons-section {
            display: flex;
            gap: 15px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-celebrate {
            background: linear-gradient(135deg, #ffeb3b, #ff6b6b);
            color: #333;
            box-shadow: 0 0 30px rgba(255, 235, 59, 0.5);
        }

        .btn-celebrate:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 0 50px rgba(255, 235, 59, 0.8);
        }

        .btn-celebrate:active {
            transform: scale(0.95);
        }

        .btn-celebrate::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
        }

        .btn-celebrate:active::before {
            animation: ripple 0.6s ease-out;
        }

        @keyframes ripple {
            0% {
                width: 0;
                height: 0;
            }
            100% {
                width: 300px;
                height: 300px;
            }
        }

        .btn-share {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            flex: 1;
            min-width: 120px;
        }

        .btn-share:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            font-size: 1.1rem;
            opacity: 0.95;
            animation: fadeIn 1s ease-out 0.5s backwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 0.95;
            }
        }

        .footer-emoji {
            font-size: 1.5rem;
            animation: twinkle 1.5s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.7; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Responsive */
@media (max-width: 768px) {
            .container {
                padding: 25px;
                margin: 20px;
            }

            .header h1 {
                font-size: 2.5rem;
            }

            .header p {
                font-size: 1rem;
            }

            .buttons-section {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .name-input,
            .percentage-input {
                font-size: 1.2rem;
            }

            .photos-grid {
                grid-template-columns: 1fr;
            }
        }

        .share-info {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-top: 10px;
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header Section -->
    <div class="header">
        <div class="emoji-celebration">🎉</div>
        <h1>Congratulations on Your 12th Result!</h1>
        <p>Your hard work and dedication have paid off. Wishing you a bright future ahead! 🌟</p>
    </div>

    <!-- Name Section -->
    <div class="name-section">
        <div class="name-label">Student Name</div>
        <input type="text" class="name-input" id="studentName" placeholder="Enter your name" value="Atul Angad Zori">
    </div>

    <!-- Result Card -->
    <div class="result-card">
        <div class="result-label">Your Score</div>
        <div class="percentage-display" id="percentageDisplay">76.67%</div>
        <input type="number" class="percentage-input" id="percentageInput" placeholder="Enter your percentage" min="0" max="100" step="0.01" value="76.67">
    </div>

    <!-- Photos Section -->
    <div class="photos-grid">
        <!-- Student Photo -->
        <div class="photo-card" onclick="document.getElementById('studentPhoto').click()">
            <input type="file" id="studentPhoto" accept="image/*">
            <div class="photo-card-label">📸 Student Photo</div>
            <div style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 10px;">Click to upload</div>
            <img id="studentPhotoPreview" class="photo-preview-circular" style="display: none;">
        </div>

        <!-- Result JPJ Photo -->
        <div class="photo-card" onclick="document.getElementById('resultPhoto').click()">
            <input type="file" id="resultPhoto" accept="image/*">
            <div class="photo-card-label">🎓 Result Sheet</div>
            <div style="font-size: 0.85rem; opacity: 0.8; margin-bottom: 10px;">Click to upload</div>
            <img id="resultPhotoPreview" class="photo-preview-circular" style="display: none;">
        </div>
    </div>

    <!-- Buttons Section -->
    <div class="buttons-section">
        <button class="btn btn-celebrate" onclick="celebrate()">
            <i class="fas fa-star"></i> Celebrate Now
        </button>
        <button class="btn btn-share" onclick="shareWhatsApp()" title="Share on WhatsApp">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </button>
        <button class="btn btn-share" onclick="shareInstagram()" title="Share on Instagram">
            <i class="fab fa-instagram"></i> Instagram
        </button>
    </div>

    <!-- Footer -->
    <div class="footer">
        Best Wishes for Your Future Success! 
        <span class="footer-emoji">✨</span>
    </div>
</div>

<script>
    // Update percentage display in real-time
    document.getElementById('percentageInput').addEventListener('input', function() {
        const value = Math.max(0, Math.min(100, parseInt(this.value) || 0));
        document.getElementById('percentageDisplay').textContent = value + '%';
        this.value = value;
    });

    // Handle student photo upload
    document.getElementById('studentPhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const preview = document.getElementById('studentPhotoPreview');
                preview.src = event.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    // Handle result JPJ photo upload
    document.getElementById('resultPhoto').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const preview = document.getElementById('resultPhotoPreview');
                preview.src = event.target.result;
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    });

    // Celebrate function with animations
    function celebrate() {
        createConfetti();
        createFireworks();
        createBalloons();
        playSuccessAnimation();
    }

    // Create confetti
    function createConfetti() {
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#ffeb3b', '#ff6ba6', '#a8e6cf'];
        for (let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.body.appendChild(confetti);

            setTimeout(() => confetti.remove(), 5000);
        }
    }

    // Create fireworks
    function createFireworks() {
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#ffeb3b', '#ff6ba6'];
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                for (let j = 0; j < 20; j++) {
                    const firework = document.createElement('div');
                    firework.className = 'firework';
                    firework.style.left = centerX + 'px';
                    firework.style.top = centerY + 'px';
                    firework.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    
                    const angle = (j / 20) * Math.PI * 2;
                    const velocity = 5 + Math.random() * 5;
                    const tx = Math.cos(angle) * velocity * 50;
                    const ty = Math.sin(angle) * velocity * 50;
                    
                    firework.style.setProperty('--tx', tx + 'px');
                    firework.style.setProperty('--ty', ty + 'px');
                    firework.style.animation = `explode 0.8s ease-out forwards`;
                    
                    document.body.appendChild(firework);
                    setTimeout(() => firework.remove(), 800);
                }
            }, i * 300);
        }
    }

    // Create balloons
    function createBalloons() {
        const balloonEmojis = ['🎈', '🎉', '🎊', '⭐', '🌟'];
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.textContent = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
                balloon.style.left = Math.random() * 80 + 10 + '%';
                balloon.style.animationDuration = (Math.random() * 2 + 4) + 's';
                balloon.style.animationDelay = Math.random() * 0.5 + 's';
                
                document.body.appendChild(balloon);
                setTimeout(() => balloon.remove(), 6000);
            }, i * 200);
        }
    }

    // Success animation
    function playSuccessAnimation() {
        const container = document.querySelector('.container');
        container.style.animation = 'none';
        setTimeout(() => {
            container.style.animation = 'cardFloat 0.6s ease-in-out';
        }, 10);
    }

    // Share on WhatsApp
    function shareWhatsApp() {
        const name = document.getElementById('studentName').value || 'My friend';
        const percentage = document.getElementById('percentageInput').value || '76.67';
        const message = `🎉 Congratulations! I have secured ${percentage}% in my 12th result! 🎊\n\nThank you for the wishes. Check out my celebration: [Congratulations Website]`;
        const encodedMessage = encodeURIComponent(message);
        window.open(`https://wa.me/?text=${encodedMessage}`, '_blank');
    }

    // Share on Instagram
    function shareInstagram() {
        alert(`🌟 Share this achievement on Instagram!\n\nCaption idea:\n"Grateful for my 12th result! 🎉 ${document.getElementById('percentageInput').value}% achieved through hard work and dedication. Excited for what's next! ✨ #12thResult #Congratulations #ProudMoment #StudentLife #Achievement"`);
        window.open('https://www.instagram.com/', '_blank');
    }

    // Create initial confetti on page load
    window.addEventListener('load', () => {
        // Small celebration on load
        const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#ffeb3b', '#ff6ba6'];
        for (let i = 0; i < 20; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 6000);
        }
    });
</script>

</body>
</html>
